<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <!--sans sherif (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
         font-family: Arial, sans-serif;
            background-color: #b8860b;
            margin: 0;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .contact-box {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .left, .right {
            flex: 1;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px black;
        }

        /* CONTACT INFO */
        .info p {
            margin: 10px 0;
        }

        /* FORM */
        input, textarea, select {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #b8860b;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        /* SOCIAL LINKS */
        .social-links a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .social-links i {
            margin-right: 10px;
        }

        .facebook { background: blue; }
        .instagram { background: palevioletred; }
        .twitter { background: lightskyblue; }
        .whatsapp { background: green; }

        /* MAP */
        .map-box iframe {
            width: 100%;
            height: 250px;
            border: 0;
            border-radius: 10px;
            margin-top: 10px;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Contact Us</h1>

    <div class="contact-box">

        <!-- LEFT SIDE -->
        <div class="left">

            <h2>Contact Information</h2>
            <div class="info">
                <p><i class="fas fa-envelope"></i> help@donations.org</p>
				<p><i class="fas fa-envelope"></i> communityhelp@kimberlyhelp.org</p>
                <p><i class="fas fa-phone"></i> 064 991 7205</p>
                <p><i class="fas fa-map-marker-alt"></i> Kimberley, South Africa</p>
            </div>

         <h2>Follow Us</h2>

    <div class="social-links">
        <a class="facebook" href="https://www.facebook.com" target="_blank">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>

        <a class="instagram" href="https://www.instagram.com" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>

        <a class="twitter" href="https://www.twitter.com" target="_blank">
            <i class="fab fa-twitter"></i> Twitter
        </a>

        <a class="whatsapp" href="https://wa.me/27812345678" target="_blank">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
    </div>  
	   
            

            <h2>Locate Us</h2>
            <div class="map-box">
                <iframe src="https://www.google.com/maps?q=Kimberley,South+Africa&output=embed"></iframe>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="right">

            <h2>Send a Message</h2>

            <form onsubmit="alert('Thank you for your message! Golden heart donation organisation will get back to you as soon as possible.'); this.reset(); return false;">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="text" placeholder="Phone Number" required pattern="[0-9]{10}" maxlength="10" title="Please enter a 10 digit phone number">

                <select required>
                    <option value="">Select Subject</option>
                    <option>Donation</option>
                    <option>Request Help</option>
                    <option>Volunteer</option>
                </select>

                <textarea rows="5" placeholder="Your Message/Quiery" required></textarea>

                <button type="submit">Send Message</button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
